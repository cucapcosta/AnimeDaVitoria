name: AnimeDaVitoria

options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  AnimeDaVitoria:
    type: application
    platform: iOS
    sources:
      - path: AnimeDaVitoriaApp.swift
      - path: Models
      - path: Views
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faculdade.animedavitoria
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  AnimeDaVitoriaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AnimeDaVitoriaUITests
        excludes:
          - "README.md"
          - "Info.plist"
    dependencies:
      - target: AnimeDaVitoria
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anime.animedavitoria.uitests
        TEST_TARGET_NAME: AnimeDaVitoria

schemes:
  AnimeDaVitoria:
    build:
      targets:
        AnimeDaVitoria: all
        AnimeDaVitoriaUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AnimeDaVitoriaUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
